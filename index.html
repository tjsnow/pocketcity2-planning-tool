<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="A local-first planning companion for Pocket City 2."
    />
    <title>Pocket City Planner</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <main
      id="app"
      class="app-shell"
      aria-label="Pocket City 2 Planner workspace"
    >
      <header class="ribbon panel" aria-label="Main toolbar">
        <div class="brand" aria-label="Pocket City 2 Planner">
          <span class="brand-mark" aria-hidden="true">PC</span>
          <span class="brand-copy"><span class="brand-title">Pocket City 2 Planner</span><span class="brand-version">v0.1.0</span></span>
        </div>
        <div class="ribbon-divider" aria-hidden="true"></div>
        <div class="ribbon-group" aria-label="File tools">
          <span class="ribbon-label">File</span>
          <button id="new-plan" class="tool-button" type="button" title="New plan">
            <span aria-hidden="true">＋</span><span>New</span>
          </button>
          <button id="open-plan" class="tool-button" type="button" title="Open plan">
            <span aria-hidden="true">↗</span><span>Open</span>
          </button>
          <button id="save-plan" class="tool-button" type="button" title="Save plan">
            <span aria-hidden="true">▣</span><span>Save</span>
          </button>
        </div>
        <div class="ribbon-divider" aria-hidden="true"></div>
        <div class="ribbon-group" aria-label="Edit tools">
          <span class="ribbon-label">Edit</span>
          <button id="undo-action" class="tool-button" type="button" title="Undo" disabled>
            <span aria-hidden="true">↶</span><span>Undo</span>
          </button>
          <button id="redo-action" class="tool-button" type="button" title="Redo" disabled>
            <span aria-hidden="true">↷</span><span>Redo</span>
          </button>
        </div>
        <div class="ribbon-spacer"></div>
        <button class="workspace-button" type="button" aria-label="Workspace settings">
          <span class="status-indicator" aria-hidden="true"></span>
          Workspace
        </button>
      </header>

      <div
        class="horizontal-resizer ribbon-resizer"
        role="separator"
        aria-label="Resize toolbar"
        aria-orientation="horizontal"
        aria-valuemin="44"
        aria-valuemax="160"
        tabindex="0"
        data-resize="ribbon"
      ></div>

      <section class="workspace" aria-label="Editor workspace">
        <aside class="toolbox panel" aria-label="Toolbox">
          <div class="panel-heading">
            <span>Toolbox</span>
            <span class="panel-heading-detail">TOOLS</span>
          </div>
          <div class="tool-list">
            <button id="select-tool" class="toolbox-item is-active" type="button">
              <span class="toolbox-icon" aria-hidden="true">⌖</span>
              Select
              <kbd>V</kbd>
            </button>
            <button class="toolbox-item" type="button">
              <span class="toolbox-icon" aria-hidden="true">✥</span>
              Pan
              <kbd>H</kbd>
            </button>
            <button class="toolbox-item" type="button">
              <span class="toolbox-icon" aria-hidden="true">▦</span>
              Grid
              <kbd>G</kbd>
            </button>
          </div>
          <section class="quick-tools" aria-label="Quick tools">
            <span class="section-label">Quick tools</span>
            <div class="quick-tool-actions">
              <button class="terrain-button" type="button" data-road-tool="true" title="Paint roads (P)">Road brush <kbd>P</kbd></button>
              <button class="terrain-button" type="button" data-bulldozer="true" title="Bulldozer: delete buildings and roads (B)">⚒ Bulldozer <kbd>B</kbd></button>
            </div>
          </section>
          <div class="building-category-icons" aria-label="Building categories">
            <button type="button" data-building-category="recreation" title="Recreation buildings">★</button>
            <button type="button" data-building-category="service" title="Service buildings">✚</button>
            <button type="button" data-building-category="transport" title="Transport buildings">⇄</button>
            <button type="button" data-building-category="terrain" title="Terrain tools">▧</button>
            <button type="button" data-building-category="roads" title="Road types">↔</button>
          </div>
          <section class="building-browser" aria-labelledby="building-browser-title">
            <div class="building-browser-header">
              <span id="building-browser-title" class="section-label">Building browser</span>
              <button type="button" class="building-browser-close" data-building-browser-close aria-label="Close building browser" title="Close">×</button>
            </div>
            <label class="visually-hidden" for="building-search">Search buildings</label>
            <input
              id="building-search"
              class="building-search"
              type="search"
              placeholder="Search buildings"
              autocomplete="off"
            />
            <label class="visually-hidden" for="building-category">Building category</label>
            <select id="building-category" class="building-category">
              <option value="">All categories</option>
            </select>
            <div id="building-results" class="building-results" role="list" aria-live="polite"></div>
          </section>
          <div class="toolbox-section">
            <span class="section-label">Layers</span>
            <button class="layer-item is-visible" type="button" data-layer="grid">
              <span aria-hidden="true">◉</span> Grid
            </button>
            <button class="layer-item is-visible" type="button" data-layer="terrain">
              <span aria-hidden="true">◉</span> Terrain
            </button>
            <button class="layer-item is-visible" type="button" data-layer="buildings">
              <span aria-hidden="true">◉</span> Buildings
            </button>
            <button class="layer-item is-visible" type="button" data-layer="roads"><span aria-hidden="true">â—‰</span> Roads</button>
            <button class="layer-item is-visible" type="button" data-layer="warnings"><span aria-hidden="true">â—‰</span> Warnings</button>
          </div>
        </aside>

        <div
          class="vertical-resizer left-resizer"
          role="separator"
          aria-label="Resize toolbox"
          aria-orientation="vertical"
          aria-valuemin="180"
          aria-valuemax="480"
          tabindex="0"
          data-resize="toolbox"
        ></div>

        <section class="canvas-panel panel" aria-label="Planning canvas">
          <div class="canvas-toolbar">
            <label class="visually-hidden" for="plan-name">Plan name</label>
            <input id="plan-name" class="document-name" value="Untitled Plan" maxlength="80" />
            <span class="document-state">Local draft</span>
            <div class="canvas-toolbar-spacer"></div>
            <button id="zoom-out" class="canvas-control" type="button" title="Zoom out">−</button>
            <span id="zoom-level" class="zoom-level">100%</span>
            <button id="zoom-in" class="canvas-control" type="button" title="Zoom in">+</button>
            <label class="visually-hidden" for="grid-size">Grid size</label>
            <select id="grid-size" class="grid-size-input" title="Grid size">
              <option value="40">40 x 40</option>
              <option value="64" selected>64 x 64</option>
              <option value="72">72 x 72</option>
            </select>
            <button id="apply-grid-size" class="canvas-control grid-apply" type="button" title="Apply grid size">✓</button>
          </div>
          <div class="canvas-frame">
            <canvas id="planner-canvas" aria-label="Empty city planning canvas"></canvas>
            <div id="canvas-building-tooltip" class="canvas-building-tooltip" role="status" aria-live="polite" hidden></div>
          </div>
        </section>

        <div
          class="vertical-resizer right-resizer"
          role="separator"
          aria-label="Resize inspector"
          aria-orientation="vertical"
          aria-valuemin="220"
          aria-valuemax="520"
          tabindex="0"
          data-resize="inspector"
        ></div>

        <aside class="inspector panel" aria-label="Inspector">
          <div class="panel-heading">
            <span>Inspector</span>
            <span class="panel-heading-detail">PROPERTIES</span>
          </div>
          <div id="inspector-content"></div>
          <section class="minimap-panel" aria-label="Minimap">
            <span class="section-label">Minimap</span>
            <canvas id="minimap-canvas" width="180" height="140" aria-label="Plan minimap"></canvas>
          </section>
        </aside>
      </section>

      <div
        class="horizontal-resizer status-resizer"
        role="separator"
        aria-label="Resize status bar"
        aria-orientation="horizontal"
        aria-valuemin="24"
        aria-valuemax="96"
        tabindex="0"
        data-resize="status"
      ></div>

      <footer class="status-bar panel" aria-label="Status bar">
        <div id="editor-status" class="status-item"><span class="status-dot" aria-hidden="true"></span> Ready</div>
        <div id="grid-status" class="status-item">Grid: 64 × 64</div>
        <div class="status-spacer"></div>
        <div id="pointer-status" class="status-item">X: — &nbsp; Y: —</div>
        <div id="canvas-status" class="status-item">Canvas: 100%</div>
      </footer>
    </main>
    <input id="plan-file-input" type="file" accept="application/json,.json" hidden />
    <script type="module" src="js/App.js"></script>
  </body>
</html>
